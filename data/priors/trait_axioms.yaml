# UHT Trait Axioms
# Each trait has axioms that derive properties when the trait is present.
# Types: necessary (always true), typical (usually true with confidence), possible (sometimes true)

# =============================================================================
# Physical Layer (Bits 1-8)
# =============================================================================

trait_1_physical_object:
  bit_position: 1
  name: "Physical Object"
  layer: physical
  description: "A discrete, bounded physical entity that occupies space and has tangible form."
  axioms:
    - type: necessary
      name: "Physical Extent"
      statement: "Physical objects occupy space and have physical extent."
      property: "has_physical_extent"
    - type: necessary
      name: "Location"
      statement: "Physical objects have a location at any given time."
      property: "has_location"
    - type: typical
      name: "Mass"
      statement: "Physical objects typically have mass."
      property: "has_mass"
      confidence: 0.95
    - type: typical
      name: "Boundaries"
      statement: "Physical objects typically have defined boundaries."
      property: "has_boundaries"
      confidence: 0.9

trait_2_synthetic:
  bit_position: 2
  name: "Synthetic"
  layer: physical
  description: "Created, manufactured, or significantly shaped by human activity or intention."
  axioms:
    - type: necessary
      name: "Human Origin"
      statement: "Synthetic entities have human origin or involvement in their creation."
      property: "has_human_origin"
    - type: typical
      name: "Designed Purpose"
      statement: "Synthetic entities typically have a designed purpose."
      property: "has_designed_purpose"
      confidence: 0.85
    - type: typical
      name: "Reproducible"
      statement: "Synthetic entities can typically be reproduced."
      property: "is_reproducible"
      confidence: 0.8

trait_3_biological:
  bit_position: 3
  name: "Biological/Biomimetic"
  layer: physical
  description: "Has biological origin or structure inspired by biology."
  axioms:
