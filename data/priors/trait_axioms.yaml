      name: "Biological Connection"
      statement: "Has biological origin, composition, or is inspired by biological systems."
      property: "has_biological_connection"
    - type: typical
      name: "Organic Composition"
      statement: "Biological entities are typically composed of organic matter."
      property: "has_organic_composition"
      confidence: 0.85
    - type: typical
      name: "Growth Capability"
      statement: "Biological entities typically can grow or develop."
      property: "can_grow"
      confidence: 0.75

trait_4_powered:
  bit_position: 4
  name: "Powered"
  layer: physical
  description: "Requires external energy input to operate or perform its primary function."
